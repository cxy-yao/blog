<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Spine层 -->
  <rect x="300" y="30" width="200" height="80" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" rx="10"/>
  <text x="400" y="75" text-anchor="middle" font-size="16" font-weight="bold">Spine-1</text>
  
  <!-- Leaf层 -->
  <rect x="100" y="180" width="150" height="80" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" rx="10"/>
  <text x="175" y="225" text-anchor="middle" font-size="14" font-weight="bold">Leaf-1</text>
  
  <rect x="325" y="180" width="150" height="80" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" rx="10"/>
  <text x="400" y="225" text-anchor="middle" font-size="14" font-weight="bold">Leaf-2</text>
  
  <rect x="550" y="180" width="150" height="80" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" rx="10"/>
  <text x="625" y="225" text-anchor="middle" font-size="14" font-weight="bold">Leaf-3</text>
  
  <!-- 服务器层 -->
  <rect x="50" y="350" width="120" height="60" fill="#ffec99" stroke="#e67700" stroke-width="2" rx="5"/>
  <text x="110" y="385" text-anchor="middle" font-size="12">Server-1</text>
  
  <rect x="250" y="350" width="120" height="60" fill="#ffec99" stroke="#e67700" stroke-width="2" rx="5"/>
  <text x="310" y="385" text-anchor="middle" font-size="12">Server-2</text>
  
  <rect x="450" y="350" width="120" height="60" fill="#ffec99" stroke="#e67700" stroke-width="2" rx="5"/>
  <text x="510" y="385" text-anchor="middle" font-size="12">Server-3</text>
  
  <rect x="650" y="350" width="120" height="60" fill="#ffec99" stroke="#e67700" stroke-width="2" rx="5"/>
  <text x="710" y="385" text-anchor="middle" font-size="12">Server-4</text>
  
  <!-- 连接线 -->
  <line x1="350" y1="110" x2="175" y2="180" stroke="#1971c2" stroke-width="2"/>
  <line x1="400" y1="110" x2="400" y2="180" stroke="#1971c2" stroke-width="2"/>
  <line x1="450" y1="110" x2="625" y2="180" stroke="#1971c2" stroke-width="2"/>
  
  <line x1="175" y1="260" x2="110" y2="350" stroke="#2f9e44" stroke-width="2"/>
  <line x1="175" y1="260" x2="310" y2="350" stroke="#2f9e44" stroke-width="2"/>
  <line x1="400" y1="260" x2="310" y2="350" stroke="#2f9e44" stroke-width="2"/>
  <line x1="400" y1="260" x2="510" y2="350" stroke="#2f9e44" stroke-width="2"/>
  <line x1="625" y1="260" x2="510" y2="350" stroke="#2f9e44" stroke-width="2"/>
  <line x1="625" y1="260" x2="710" y2="350" stroke="#2f9e44" stroke-width="2"/>
  
  <!-- 标签 -->
  <text x="250" y="150" text-anchor="middle" font-size="11" fill="#666">VXLAN隧道</text>
  <text x="300" y="310" text-anchor="middle" font-size="11" fill="#666">EVPN控制面</text>
</svg>
