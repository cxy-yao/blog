<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="author" content="{{ site.author }}">
    <meta name="theme-color" content="#0f172a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Pacifico&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
/* ═══════════════════════════════════════════
   Design System — ChenChuLin's Blog
   ═══════════════════════════════════════════ */
:root {
    --bg-primary: #0a0e1a;
    --bg-secondary: #0f172a;
    --bg-card: rgba(15, 23, 42, 0.6);
    --bg-card-hover: rgba(30, 41, 59, 0.8);
    --glass: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.06);
    --glass-hover: rgba(255, 255, 255, 0.08);
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #475569;
    --accent-blue: #3b82f6;
    --accent-cyan: #06b6d4;
    --accent-purple: #8b5cf6;
    --accent-pink: #ec4899;
    --accent-emerald: #10b981;
    --accent-amber: #f59e0b;
    --gradient-main: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
    --gradient-cool: linear-gradient(135deg, #06b6d4, #3b82f6);
    --gradient-warm: linear-gradient(135deg, #f59e0b, #ec4899);
    --radius: 16px;
    --radius-sm: 10px;
    --radius-lg: 24px;
    --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.2), 0 1px 2px rgba(0, 0, 0, 0.1);
    --shadow-glow: 0 0 40px rgba(59, 130, 246, 0.15);
    --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    --transition-fast: all 0.2s ease;
    --font-sans: 'Noto Sans SC', 'Inter', -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    --font-display: 'Pacifico', cursive;
    --nav-height: 72px;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; scrollbar-width: thin; scrollbar-color: rgba(59,130,246,0.3) transparent; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(59,130,246,0.3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(59,130,246,0.5); }
::selection { background: rgba(59,130,246,0.3); color: #fff; }

body {
    font-family: var(--font-sans);
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.8;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
}

/* ─── Particle Canvas ─── */
#particle-canvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 0; pointer-events: none;
}
.bg-gradient-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none;
    background:
        radial-gradient(ellipse 600px 400px at 20% 20%, rgba(59,130,246,0.08), transparent),
        radial-gradient(ellipse 500px 500px at 80% 80%, rgba(139,92,246,0.06), transparent),
        radial-gradient(ellipse 400px 300px at 50% 50%, rgba(6,182,212,0.04), transparent);
}

/* ─── Navbar ─── */
.navbar {
    position: fixed; top: 0; left: 0; width: 100%; height: var(--nav-height);
    z-index: 1000; transition: background 0.4s ease, box-shadow 0.4s ease;
    background: rgba(10, 14, 26, 0.6);
    backdrop-filter: blur(20px) saturate(1.8);
    -webkit-backdrop-filter: blur(20px) saturate(1.8);
    border-bottom: 1px solid var(--glass-border);
}
.navbar.scrolled {
    background: rgba(10, 14, 26, 0.9);
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
}
.navbar .container {
    max-width: 100%; margin: 0 auto; padding: 0 clamp(24px, 4vw, 60px);
    height: 100%; display: flex; justify-content: space-between; align-items: center;
}
.logo {
    display: flex; align-items: center; gap: clamp(10px, 1.5vw, 14px);
    text-decoration: none !important; color: var(--text-primary) !important;
    transition: var(--transition-fast);
}
.logo:hover { transform: scale(1.03); }
.logo-icon {
    width: clamp(34px, 3vw, 40px); height: clamp(34px, 3vw, 40px); border-radius: 12px;
    background: var(--gradient-main); display: flex; align-items: center; justify-content: center;
    font-size: clamp(1rem, 1.2vw, 1.2rem); box-shadow: 0 0 20px rgba(59,130,246,0.3);
    animation: logo-float 3s ease-in-out infinite;
}
.logo-text {
    font-family: var(--font-display); font-size: clamp(1.2rem, 1.5vw, 1.5rem);
    background: var(--gradient-main); background-size: 200% 200%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; animation: gradient-shift 6s ease infinite;
}
.nav-links { display: flex; gap: clamp(2px, 0.5vw, 4px); }
.nav-link {
    color: var(--text-secondary) !important; text-decoration: none !important;
    padding: clamp(7px, 1vw, 10px) clamp(12px, 1.5vw, 18px); border-radius: var(--radius-sm);
    font-size: clamp(0.82rem, 0.95vw, 0.92rem); font-weight: 500; position: relative;
    transition: var(--transition-fast); letter-spacing: 0.3px;
}
.nav-link::after {
    content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
    width: 0; height: 2px; background: var(--gradient-main);
    border-radius: 1px; transition: width 0.3s ease;
}
.nav-link:hover, .nav-link.active {
    color: var(--text-primary) !important; background: var(--glass-hover);
}
.nav-link:hover::after, .nav-link.active::after { width: 24px; }
.nav-link i { margin-right: 6px; font-size: 0.85rem; }
.mobile-toggle { display: none; background: none; border: none; color: var(--text-primary); font-size: 1.3rem; cursor: pointer; padding: 8px; }

/* ─── Main Layout ─── */
.main-content {
    position: relative; z-index: 1;
    min-height: calc(100vh - var(--nav-height) - 160px);
    padding: calc(var(--nav-height) + 40px) 0 60px;
}
.container { max-width: 1200px; margin: 0 auto; padding: 0 28px; }

/* ─── Section Titles ─── */
.section-title {
    font-size: 1.5rem; font-weight: 700; margin-bottom: 36px;
    display: flex; align-items: center; gap: 14px;
    position: relative; padding-left: 20px;
}
.section-title::before {
    content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    width: 4px; height: 28px; border-radius: 2px;
    background: var(--gradient-main);
    box-shadow: 0 0 12px rgba(59,130,246,0.4);
}
.section-title i { color: var(--accent-cyan); font-size: 1.2rem; }

/* ─── Footer ─── */
.footer {
    position: relative; z-index: 1;
    background: rgba(5, 8, 18, 0.95); backdrop-filter: blur(20px);
    padding: 0; margin-top: 80px;
}
.footer-divider {
    height: 1px; border: none;
    background: linear-gradient(90deg, transparent, rgba(59,130,246,0.3), rgba(139,92,246,0.3), rgba(6,182,212,0.3), transparent);
}
.footer-inner {
    display: grid; grid-template-columns: 1fr 1.8fr;
    gap: 40px; padding: 52px 0 36px; align-items: center;
}
.footer-brand { text-align: center; }
.footer-brand .footer-logo {
    display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 16px;
    font-family: var(--font-display); font-size: 1.3rem; color: var(--text-primary);
}
.footer-brand .footer-logo-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--gradient-main); display: flex; align-items: center; justify-content: center;
    font-size: 1rem; box-shadow: 0 0 16px rgba(59,130,246,0.25);
}
.footer-brand p { color: var(--text-muted); font-size: 0.88rem; line-height: 1.7; }
.footer-col h4 {
    font-size: 0.78rem; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 18px;
}
.footer-col ul { list-style: none; padding: 0; }
.footer-col li { margin-bottom: 10px; }
.footer-col a {
    color: var(--text-secondary) !important; font-size: 0.9rem; text-decoration: none !important;
    transition: var(--transition-fast); display: inline-flex; align-items: center; gap: 8px;
}
.footer-col a:hover { color: var(--accent-blue) !important; transform: translateX(4px); }
.footer-col a i { font-size: 0.75rem; color: var(--text-muted); transition: var(--transition-fast); }
.footer-col a:hover i { color: var(--accent-blue); }
.footer-tech { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
.footer-tech-badge {
    padding: 5px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: 500;
    background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
    color: var(--text-muted); transition: var(--transition-fast);
}
.footer-tech-badge:hover { border-color: rgba(59,130,246,0.2); color: var(--text-secondary); }
.footer-bottom {
    position: relative;
    display: flex; justify-content: center; align-items: center;
    padding: 20px 0; border-top: 1px solid rgba(255,255,255,0.04);
    font-size: 0.82rem; color: var(--text-muted);
}
.footer-bottom-left { display: flex; align-items: center; gap: 6px; }
.footer-bottom .heart { color: #ef4444; animation: heartbeat 1.5s ease infinite; display: inline-block; }
.footer-bottom a { color: var(--accent-blue) !important; text-decoration: none !important; transition: var(--transition-fast); }
.footer-bottom a:hover { color: var(--accent-cyan) !important; }
.back-to-top {
    position: absolute; right: 0;
    width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--glass-border);
    background: rgba(255,255,255,0.03); color: var(--text-muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 0.85rem;
    transition: var(--transition-fast);
}
.back-to-top:hover { border-color: rgba(59,130,246,0.3); color: var(--accent-blue); transform: translateY(-2px); }
@media (max-width: 768px) {
    .footer-inner { grid-template-columns: 1fr; gap: 32px; }
    .footer-bottom { flex-direction: column; gap: 12px; text-align: center; }
}

/* ─── Post Card ─── */
.post-card {
    background: var(--bg-card); border-radius: var(--radius);
    padding: 32px; border: 1px solid var(--glass-border);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    transition: var(--transition); display: flex; flex-direction: column;
    position: relative; overflow: hidden;
}
.post-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--gradient-main); opacity: 0; transition: var(--transition);
}
.post-card::after {
    content: ''; position: absolute; inset: 0; border-radius: var(--radius);
    background: radial-gradient(600px circle at var(--mouse-x, 50%) var(--mouse-y, 0%), rgba(59,130,246,0.06), transparent 40%);
    pointer-events: none; opacity: 0; transition: opacity 0.5s;
}
.post-card:hover {
    transform: translateY(-8px); border-color: rgba(59,130,246,0.2);
    box-shadow: var(--shadow-card), var(--shadow-glow);
    background: var(--bg-card-hover);
}
.post-card:hover::before { opacity: 1; }
.post-card:hover::after { opacity: 1; }
.post-card-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 18px; font-size: 0.82rem; color: var(--text-muted);
}
.post-card-category {
    padding: 4px 14px; border-radius: 20px; font-size: 0.72rem;
    font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
}
.post-card-category.cat-network { background: rgba(59,130,246,0.15); color: var(--accent-blue); }
.post-card-category.cat-datacenter { background: rgba(139,92,246,0.15); color: var(--accent-purple); }
.post-card-category.cat-linux { background: rgba(16,185,129,0.15); color: var(--accent-emerald); }
.post-card-category.cat-default { background: rgba(245,158,11,0.15); color: var(--accent-amber); }
.post-card-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 14px; line-height: 1.45; }
.post-card-title a { color: var(--text-primary) !important; text-decoration: none !important; transition: var(--transition-fast); }
.post-card-title a:hover { color: var(--accent-blue) !important; }
.post-card-excerpt { color: var(--text-secondary); font-size: 0.93rem; line-height: 1.75; margin-bottom: 20px; flex-grow: 1; }
.post-card-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
.tag-pill {
    font-size: 0.72rem; color: var(--accent-cyan); background: rgba(6,182,212,0.08);
    padding: 4px 12px; border-radius: 20px; font-weight: 500;
    border: 1px solid rgba(6,182,212,0.12); transition: var(--transition-fast);
}
.tag-pill:hover { background: rgba(6,182,212,0.15); border-color: rgba(6,182,212,0.25); }
.read-more {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 0.9rem; font-weight: 600; color: var(--accent-blue) !important;
    margin-top: auto; text-decoration: none !important; transition: var(--transition-fast);
}
.read-more .arrow { transition: transform 0.3s ease; display: inline-block; }
.read-more:hover { color: var(--accent-cyan) !important; gap: 14px; }
.read-more:hover .arrow { transform: translateX(4px); }

/* ─── Post Detail ─── */
.post-detail { max-width: 780px; margin: 0 auto; }
.post-header { margin-bottom: 48px; padding-bottom: 32px; border-bottom: 1px solid var(--glass-border); }
.post-meta {
    display: flex; gap: 20px; margin-bottom: 20px; font-size: 0.88rem; color: var(--text-muted);
    flex-wrap: wrap; align-items: center;
}
.post-meta i { margin-right: 6px; color: var(--accent-blue); }
.category-tag {
    padding: 4px 14px; border-radius: 20px; font-size: 0.78rem; font-weight: 600;
    background: rgba(59,130,246,0.15); color: var(--accent-blue);
}
.post-title {
    font-size: 2.6rem; font-weight: 800; line-height: 1.3; margin-bottom: 20px;
    background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.post-tags { display: flex; flex-wrap: wrap; gap: 10px; }
.tag {
    font-size: 0.82rem; color: var(--accent-cyan); background: rgba(6,182,212,0.08);
    padding: 6px 16px; border-radius: 20px; font-weight: 500;
    border: 1px solid rgba(6,182,212,0.12); transition: var(--transition-fast);
}
.tag:hover { background: rgba(6,182,212,0.15); border-color: rgba(6,182,212,0.25); }

/* ─── Reading Progress Bar ─── */
.reading-progress {
    position: fixed; top: var(--nav-height); left: 0; width: 0%; height: 3px;
    background: var(--gradient-main); z-index: 999; transition: width 0.1s linear;
    box-shadow: 0 0 10px rgba(59,130,246,0.5);
}

/* ─── Table of Contents ─── */
.toc-panel {
    position: fixed; right: calc((100vw - 1200px) / 2 - 260px); top: calc(var(--nav-height) + 60px);
    width: 220px; max-height: calc(100vh - var(--nav-height) - 120px);
    overflow-y: auto; z-index: 10; padding: 20px;
    background: var(--bg-card); backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border); border-radius: var(--radius);
}
.toc-panel::-webkit-scrollbar { width: 3px; }
.toc-title { font-size: 0.82rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }
.toc-list { list-style: none; }
.toc-list li { margin-bottom: 2px; }
.toc-list a {
    display: block; padding: 5px 10px; font-size: 0.8rem; color: var(--text-muted);
    text-decoration: none !important; border-radius: 6px; transition: var(--transition-fast);
    border-left: 2px solid transparent;
}
.toc-list a:hover, .toc-list a.active {
    color: var(--accent-blue); background: rgba(59,130,246,0.06);
    border-left-color: var(--accent-blue);
}
.toc-list .toc-h3 { padding-left: 24px; }

/* ─── Post Content (Article Body) ─── */
.post-content { font-size: 1.05rem; line-height: 1.9; }
.post-content h2 {
    font-size: 1.65rem; font-weight: 700; margin-top: 3em; margin-bottom: 1em;
    padding-bottom: 10px; position: relative;
    border-bottom: 1px solid var(--glass-border);
}
.post-content h2::after {
    content: ''; position: absolute; bottom: -1px; left: 0; width: 60px; height: 2px;
    background: var(--gradient-main); border-radius: 1px;
}
.post-content h3 {
    font-size: 1.3rem; font-weight: 700; margin-top: 2.5em; margin-bottom: 0.8em;
    padding-left: 16px; border-left: 3px solid var(--accent-blue);
}
.post-content p { margin-bottom: 1.3em; color: var(--text-secondary); }
.post-content ul, .post-content ol { margin-bottom: 1.3em; padding-left: 1.8em; color: var(--text-secondary); }
.post-content li { margin-bottom: 0.5em; }
.post-content strong { color: var(--text-primary); font-weight: 700; }
.post-content hr { border: none; height: 1px; background: var(--glass-border); margin: 3em 0; }
.post-content blockquote {
    border-left: 3px solid var(--accent-blue); background: rgba(59,130,246,0.04);
    padding: 20px 24px; margin: 28px 0; border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    color: var(--text-secondary); position: relative;
}
.post-content blockquote::before {
    content: '\201C'; position: absolute; top: -8px; left: 12px;
    font-size: 3.5rem; color: var(--accent-blue); opacity: 0.15; font-family: Georgia, serif;
}
.post-content blockquote strong { color: var(--accent-blue); }
.post-content code {
    font-family: var(--font-mono); background: rgba(59,130,246,0.08);
    padding: 2px 8px; border-radius: 6px; font-size: 0.86em; color: var(--accent-cyan);
    border: 1px solid rgba(59,130,246,0.1);
}
.post-content pre {
    background: rgba(0, 0, 0, 0.4); border: 1px solid var(--glass-border);
    border-radius: var(--radius-sm); padding: 0; margin: 28px 0;
    overflow: hidden; position: relative;
}
.post-content pre .code-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 20px; background: rgba(255,255,255,0.03);
    border-bottom: 1px solid var(--glass-border); font-size: 0.78rem;
}
.post-content pre .code-lang { color: var(--text-muted); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.5px; }
.post-content pre .code-copy {
    background: none; border: 1px solid var(--glass-border); color: var(--text-muted);
    padding: 3px 10px; border-radius: 6px; font-size: 0.72rem; cursor: pointer;
    transition: var(--transition-fast); font-family: var(--font-sans);
}
.post-content pre .code-copy:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
.post-content pre code {
    display: block; padding: 20px; overflow-x: auto; background: none;
    border: none; font-size: 0.88em; line-height: 1.7; color: var(--text-secondary);
}
.post-content a { color: var(--accent-blue); text-decoration: none; border-bottom: 1px dashed rgba(59,130,246,0.4); transition: var(--transition-fast); }
.post-content a:hover { color: var(--accent-cyan); border-bottom-color: var(--accent-cyan); }
.post-content table {
    width: 100%; border-collapse: collapse; margin: 28px 0; font-size: 0.92rem;
    border-radius: var(--radius-sm); overflow: hidden;
    border: 1px solid var(--glass-border);
}
.post-content thead { background: rgba(59,130,246,0.08); }
.post-content th { padding: 12px 16px; text-align: left; font-weight: 600; color: var(--text-primary); font-size: 0.85rem; }
.post-content td { padding: 12px 16px; border-top: 1px solid var(--glass-border); color: var(--text-secondary); }
.post-content tr:hover td { background: rgba(59,130,246,0.03); }
.post-content img { max-width: 100%; border-radius: var(--radius-sm); margin: 28px 0; }

/* ─── Post Footer ─── */
.post-footer { margin-top: 56px; padding-top: 32px; border-top: 1px solid var(--glass-border); }
.back-link {
    display: inline-flex; align-items: center; gap: 10px;
    color: var(--text-secondary) !important; font-weight: 600; font-size: 0.95rem;
    transition: var(--transition-fast); padding: 12px 24px; border-radius: var(--radius-sm);
    border: 1px solid var(--glass-border); text-decoration: none !important;
}
.back-link:hover {
    color: var(--accent-blue) !important; border-color: rgba(59,130,246,0.3);
    background: rgba(59,130,246,0.06); transform: translateX(-4px);
}
.back-link i { transition: transform 0.3s ease; }
.back-link:hover i { transform: translateX(-4px); }

/* ─── About Page ─── */
.about-page { max-width: 860px; margin: 0 auto; }
.about-header { text-align: center; padding: 60px 0 40px; }
.about-avatar {
    width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 28px;
    background: var(--gradient-main); display: flex; align-items: center; justify-content: center;
    font-size: 3.5rem; box-shadow: 0 0 40px rgba(59,130,246,0.3);
    animation: logo-float 4s ease-in-out infinite;
}
.about-header h1 {
    font-size: 2.8rem; font-weight: 900; margin-bottom: 12px;
    background: var(--gradient-main); background-size: 200% 200%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; animation: gradient-shift 6s ease infinite;
}
.about-role { font-size: 1.15rem; color: var(--text-secondary); font-weight: 300; letter-spacing: 1px; }
.about-section {
    background: var(--bg-card); border-radius: var(--radius); padding: 36px;
    margin-bottom: 24px; border: 1px solid var(--glass-border);
    backdrop-filter: blur(16px); transition: var(--transition);
}
.about-section:hover { border-color: rgba(59,130,246,0.15); box-shadow: var(--shadow-card); }
.about-section h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 24px; display: flex; align-items: center; gap: 14px; }
.about-section h2 i { color: var(--accent-cyan); font-size: 1.2rem; }
.about-section p { color: var(--text-secondary); line-height: 1.85; }
.skills-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.skill-card {
    background: rgba(0,0,0,0.2); padding: 28px; border-radius: var(--radius-sm);
    text-align: center; transition: var(--transition); border: 1px solid transparent;
}
.skill-card:hover {
    transform: translateY(-4px); background: rgba(0,0,0,0.3);
    border-color: rgba(59,130,246,0.15); box-shadow: var(--shadow-card);
}
.skill-icon { font-size: 2.5rem; margin-bottom: 14px; }
.skill-card h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
.skill-card p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; }
.contact-links { display: flex; gap: 14px; flex-wrap: wrap; }
.contact-btn {
    display: inline-flex; align-items: center; gap: 12px;
    background: rgba(0,0,0,0.3); color: var(--text-primary) !important;
    padding: 14px 28px; border-radius: var(--radius-sm); font-weight: 600; font-size: 0.95rem;
    transition: var(--transition); border: 1px solid var(--glass-border);
    text-decoration: none !important;
}
.contact-btn:hover {
    background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.3);
    transform: translateY(-3px); box-shadow: 0 8px 24px rgba(59,130,246,0.15);
}
.contact-btn i { font-size: 1.2rem; }

/* ─── Scroll Reveal Animation ─── */
.reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.7s ease, transform 0.7s ease; }
.reveal.visible { opacity: 1; transform: translateY(0); }

/* ─── Animations ─── */
@keyframes gradient-shift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
@keyframes logo-float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
}
@keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
}
@keyframes fade-in-up {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
.fade-in-up { animation: fade-in-up 0.6s ease forwards; }

/* ─── Responsive ─── */
@media (max-width: 1600px) { .toc-panel { display: none; } }
@media (max-width: 768px) {
    :root { --nav-height: 64px; }
    .nav-links {
        display: none; position: fixed; top: var(--nav-height); left: 0; width: 100%;
        background: rgba(10, 14, 26, 0.95); backdrop-filter: blur(20px);
        flex-direction: column; padding: 20px; gap: 4px;
        border-bottom: 1px solid var(--glass-border);
    }
    .nav-links.open { display: flex; }
    .mobile-toggle { display: block; }
    .container { padding: 0 18px; }
    .post-title { font-size: clamp(1.5rem, 4vw, 1.9rem); }
    .post-card { padding: 24px; }
    .skills-grid { grid-template-columns: 1fr; }
    .about-header h1 { font-size: clamp(1.8rem, 5vw, 2.2rem); }
}
@media (max-width: 480px) {
    .post-meta { flex-direction: column; gap: 10px; }
    .contact-links { flex-direction: column; }
    .contact-btn { justify-content: center; }
}
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="bg-gradient-overlay"></div>

    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="/" class="logo">
                <span class="logo-icon">⚡</span>
                <span class="logo-text">ChenChuLin</span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="/" class="nav-link {% if page.url == '/' %}active{% endif %}"><i class="fas fa-home"></i> 首页</a>
                <a href="/categories/" class="nav-link {% if page.url == '/categories/' %}active{% endif %}"><i class="fas fa-folder"></i> 分类</a>
                <a href="/tags/" class="nav-link {% if page.url == '/tags/' %}active{% endif %}"><i class="fas fa-tags"></i> 标签</a>
                <a href="/about/" class="nav-link {% if page.url == '/about/' %}active{% endif %}"><i class="fas fa-user"></i> 关于</a>
                <a href="#" class="nav-link"><i class="fab fa-github"></i> GitHub</a>
            </div>
            <button class="mobile-toggle" id="mobileToggle"><i class="fas fa-bars"></i></button>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            {{ content }}
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <hr class="footer-divider">
            <div class="footer-inner">
                <div class="footer-brand">
                    <div class="footer-logo">
                        <span class="footer-logo-icon">⚡</span>
                        ChenChuLin
                    </div>
                    <p>专注于数据中心网络、AI算力架构、路由交换与Linux运维的技术博客。</p>
                </div>
                <div class="footer-col">
                    <h4>技术栈</h4>
                    <div class="footer-tech">
                        <span class="footer-tech-badge">Jekyll</span>
                        <span class="footer-tech-badge">GitHub Pages</span>
                        <span class="footer-tech-badge">Cloudflare</span>
                        <span class="footer-tech-badge">Markdown</span>
                        <span class="footer-tech-badge">Huawei CE</span>
                        <span class="footer-tech-badge">BGP/OSPF</span>
                        <span class="footer-tech-badge">VXLAN</span>
                        <span class="footer-tech-badge">EVPN</span>
                        <span class="footer-tech-badge">RoCEv2</span>
                        <span class="footer-tech-badge">Python</span>
                        <span class="footer-tech-badge">Netmiko</span>
                        <span class="footer-tech-badge">WSL2</span>
                        <span class="footer-tech-badge">Docker</span>
                        <span class="footer-tech-badge">Git</span>
                        <span class="footer-tech-badge">Linux</span>
                    </div>
                </div>
            </div>
            <div class="footer-bottom">
                © {{ site.time | date: "%Y" }} {{ site.author }} · 用心记录每一行代码
                <button class="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})"><i class="fas fa-arrow-up"></i></button>
            </div>
        </div>
    </footer>

    <script>
    /* ─── Particle System ─── */
    (function() {
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [], mouse = { x: 0, y: 0 };
        const PARTICLE_COUNT = window.innerWidth < 768 ? 40 : 80;
        const CONNECTION_DIST = 150;
        const COLORS = ['rgba(59,130,246,', 'rgba(139,92,246,', 'rgba(6,182,212,', 'rgba(236,72,153,'];

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 2 + 0.5;
                this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
                this.opacity = Math.random() * 0.5 + 0.1;
                this.pulseSpeed = Math.random() * 0.02 + 0.005;
                this.pulseOffset = Math.random() * Math.PI * 2;
            }
            update(t) {
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                // Mouse interaction
                const dx = mouse.x - this.x, dy = mouse.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 200) {
                    const force = (200 - dist) / 200 * 0.02;
                    this.vx += dx * force * 0.01; this.vy += dy * force * 0.01;
                }
                // Pulse opacity
                this.currentOpacity = this.opacity + Math.sin(t * this.pulseSpeed + this.pulseOffset) * 0.15;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color + this.currentOpacity + ')';
                ctx.fill();
            }
        }

        for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

        document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

        function animate(t) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(t); p.draw(); });
            // Draw connections
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < CONNECTION_DIST) {
                        const opacity = (1 - dist / CONNECTION_DIST) * 0.15;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = 'rgba(59,130,246,' + opacity + ')';
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
    })();

    /* ─── Navbar Scroll Effect ─── */
    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', () => {
        navbar.classList.toggle('scrolled', window.scrollY > 50);
    });

    /* ─── Mobile Menu Toggle ─── */
    const toggle = document.getElementById('mobileToggle');
    const navLinks = document.getElementById('navLinks');
    toggle && toggle.addEventListener('click', () => {
        navLinks.classList.toggle('open');
        const icon = toggle.querySelector('i');
        icon.className = navLinks.classList.contains('open') ? 'fas fa-times' : 'fas fa-bars';
    });

    /* ─── Scroll Reveal ─── */
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    /* ─── Card Mouse Follow ─── */
    document.querySelectorAll('.post-card').forEach(card => {
        card.addEventListener('mousemove', e => {
            const rect = card.getBoundingClientRect();
            card.style.setProperty('--mouse-x', (e.clientX - rect.left) + 'px');
            card.style.setProperty('--mouse-y', (e.clientY - rect.top) + 'px');
        });
    });
    </script>
</body>
</html>
