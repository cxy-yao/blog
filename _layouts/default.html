<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">
                <span class="logo-icon">⚡</span>
                <span class="logo-text">ChenChuLin</span>
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link {% if page.url == '/' %}active{% endif %}">首页</a>
                <a href="/about/" class="nav-link {% if page.url == '/about/' %}active{% endif %}">关于</a>
                <a href="https://github.com/cxy-yao" target="_blank" class="nav-link">GitHub</a>
            </div>
        </div>
    </nav>
    <main class="main-content">
        <div class="container">
            {{ content }}
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; {{ site.time | date: "%Y" }} {{ site.author }}. All rights reserved.</p>
                <p>Powered by <a href="https://jekyllrb.com" target="_blank">Jekyll</a> & <a href="https://pages.github.com" target="_blank">GitHub Pages</a></p>
            </div>
        </div>
    </footer>
</body>
</html>
