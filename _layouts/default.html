<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="author" content="{{ site.author }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
:root{--primary:#6366f1;--primary-light:#818cf8;--primary-dark:#4f46e5;--accent:#22d3ee;--accent2:#a78bfa;--bg-dark:#0f172a;--bg-card:rgba(30,41,59,0.85);--bg-card-hover:rgba(51,65,85,0.9);--text-primary:#f8fafc;--text-secondary:#94a3b8;--text-muted:#64748b;--border:rgba(51,65,85,0.6);--radius:12px;--radius-lg:16px;--transition:all .3s ease;--glow:0 0 20px rgba(99,102,241,0.3)}*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg-dark);color:var(--text-primary);line-height:1.7;min-height:100vh;position:relative}a{color:var(--primary-light);text-decoration:none;transition:var(--transition)}a:hover{color:var(--accent)}.container{max-width:1200px;margin:0 auto;padding:0 24px}
.starry-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;background-size:cover;background-position:center;background-repeat:no-repeat;transition:opacity 1.5s ease-in-out;opacity:0}.starry-bg.active{opacity:1}.starry-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;background:rgba(15,23,42,0.75);pointer-events:none}
.navbar{background:rgba(15,23,42,.85);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding:16px 0;transition:var(--transition)}.navbar .container{display:flex;justify-content:space-between;align-items:center}.logo{display:flex;align-items:center;gap:12px;font-size:1.4rem;font-weight:800;color:var(--text-primary)!important;text-decoration:none;transition:var(--transition)}.logo:hover{transform:scale(1.02)}.logo-icon{font-size:1.6rem;animation:pulse 2s ease-in-out infinite}.logo-text{background:linear-gradient(135deg,var(--primary-light),var(--accent),var(--accent2));background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradient-shift 4s ease infinite;letter-spacing:0.5px}.nav-links{display:flex;gap:8px}.nav-link{color:var(--text-secondary)!important;padding:10px 18px;border-radius:10px;font-size:.95rem;font-weight:600;transition:var(--transition);text-decoration:none;position:relative;overflow:hidden}.nav-link::before{content:'';position:absolute;bottom:0;left:50%;width:0;height:2px;background:linear-gradient(90deg,var(--primary-light),var(--accent));transition:var(--transition);transform:translateX(-50%)}.nav-link:hover,.nav-link.active{color:var(--text-primary)!important;background:rgba(99,102,241,0.15)}.nav-link:hover::before,.nav-link.active::before{width:60%}
.main-content{min-height:calc(100vh - 200px);padding:40px 0}
.hero{text-align:center;padding:80px 0 60px;position:relative}.hero::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;background:radial-gradient(circle,rgba(99,102,241,0.15) 0%,transparent 70%);border-radius:50%;pointer-events:none;animation:hero-glow 3s ease-in-out infinite alternate}.hero-title{font-size:3.5rem;font-weight:900;margin-bottom:20px;background:linear-gradient(135deg,var(--primary-light) 0%,var(--accent) 50%,var(--accent2) 100%);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradient-shift 4s ease infinite;letter-spacing:-1px;line-height:1.2;text-shadow:0 0 40px rgba(99,102,241,0.3)}.hero-subtitle{font-size:1.3rem;color:var(--text-secondary);font-weight:300;letter-spacing:0.5px;position:relative;display:inline-block}.hero-subtitle::before,.hero-subtitle::after{content:'—';color:var(--primary-light);opacity:0.5;margin:0 12px}.hero-divider{width:80px;height:3px;background:linear-gradient(90deg,var(--primary-light),var(--accent));margin:24px auto;border-radius:2px;box-shadow:var(--glow)}
.section-title{font-size:1.6rem;font-weight:700;margin-bottom:36px;display:flex;align-items:center;gap:14px;position:relative;padding-left:16px}.section-title::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:4px;height:28px;background:linear-gradient(180deg,var(--primary-light),var(--accent));border-radius:2px;box-shadow:var(--glow)}.section-title i{color:var(--accent);font-size:1.3rem}
.posts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:28px}
.post-card{background:var(--bg-card);border-radius:var(--radius-lg);padding:32px;transition:var(--transition);border:1px solid var(--border);display:flex;flex-direction:column;-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);position:relative;overflow:hidden}.post-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,var(--primary-light),var(--accent),var(--accent2));opacity:0;transition:var(--transition)}.post-card:hover{transform:translateY(-6px);box-shadow:0 20px 40px rgba(0,0,0,0.3);border-color:var(--primary-dark);background:var(--bg-card-hover)}.post-card:hover::before{opacity:1}.post-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;font-size:.85rem;color:var(--text-muted)}.post-card-category{background:linear-gradient(135deg,var(--primary-dark),var(--primary));color:var(--text-primary);padding:5px 14px;border-radius:20px;font-size:.75rem;font-weight:600;letter-spacing:0.3px}.post-card-title{font-size:1.4rem;font-weight:700;margin-bottom:14px;line-height:1.4;transition:var(--transition)}.post-card-title a{color:var(--text-primary)!important}.post-card-title a:hover{color:var(--primary-light)!important}.post-card-excerpt{color:var(--text-secondary);font-size:.95rem;line-height:1.7;margin-bottom:18px;flex-grow:1}.post-card-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}.tag-small{font-size:.75rem;color:var(--accent);background:rgba(34,211,238,0.12);padding:5px 12px;border-radius:8px;font-weight:500;transition:var(--transition)}.tag-small:hover{background:rgba(34,211,238,0.2)}.read-more{display:inline-flex;align-items:center;gap:10px;font-size:.95rem;font-weight:600;color:var(--primary-light)!important;margin-top:auto;transition:var(--transition)}.read-more i{transition:var(--transition)}.read-more:hover{color:var(--accent)!important;gap:14px}
.post-detail{max-width:800px;margin:0 auto}.post-header{margin-bottom:44px;padding-bottom:28px;border-bottom:1px solid var(--border)}.post-meta{display:flex;gap:24px;margin-bottom:18px;font-size:.9rem;color:var(--text-muted)}.post-meta i{margin-right:8px;color:var(--primary-light)}.category-tag{background:linear-gradient(135deg,var(--primary-dark),var(--primary));color:var(--text-primary);padding:4px 14px;border-radius:14px;font-size:.8rem;font-weight:600}.post-title{font-size:2.8rem;font-weight:800;line-height:1.25;margin-bottom:20px;background:linear-gradient(135deg,var(--text-primary),var(--text-secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.post-tags{display:flex;flex-wrap:wrap;gap:10px}.tag{font-size:.85rem;color:var(--accent);background:rgba(34,211,238,0.12);padding:6px 16px;border-radius:10px;font-weight:500;transition:var(--transition)}.tag:hover{background:rgba(34,211,238,0.2)}
.post-content{font-size:1.08rem;line-height:1.85}.post-content h1,.post-content h2,.post-content h3,.post-content h4{margin-top:2.5em;margin-bottom:1em;font-weight:700;color:var(--text-primary);position:relative}.post-content h2{font-size:1.7rem;padding-bottom:12px;border-bottom:2px solid transparent;border-image:linear-gradient(90deg,var(--primary-light),var(--accent)) 1}.post-content h3{font-size:1.4rem;padding-left:14px;border-left:3px solid var(--primary-light)}.post-content p{margin-bottom:1.3em;color:var(--text-secondary)}.post-content ul,.post-content ol{margin-bottom:1.3em;padding-left:2em;color:var(--text-secondary)}.post-content li{margin-bottom:.6em}.post-content blockquote{border-left:4px solid var(--primary);background:rgba(30,41,59,0.7);padding:20px 28px;margin:28px 0;border-radius:0 var(--radius) var(--radius) 0;font-style:italic;color:var(--text-secondary);position:relative}.post-content blockquote::before{content:'\201C';position:absolute;top:-10px;left:10px;font-size:4rem;color:var(--primary-light);opacity:0.2;font-family:Georgia,serif}.post-content code{font-family:'JetBrains Mono',monospace;background:rgba(30,41,59,0.8);padding:3px 10px;border-radius:6px;font-size:.88em;color:var(--accent);border:1px solid rgba(34,211,238,0.1)}.post-content pre{background:rgba(15,23,42,0.9);padding:24px;border-radius:var(--radius);overflow-x:auto;margin:28px 0;border:1px solid var(--border);position:relative}.post-content pre code{background:none;padding:0;color:var(--text-primary);border:none;font-size:.92em}.post-content img{max-width:100%;border-radius:var(--radius);margin:28px 0;box-shadow:0 8px 24px rgba(0,0,0,0.3)}.post-content strong{color:var(--text-primary);font-weight:700}.post-content hr{border:none;height:2px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:3em 0}.post-content a{color:var(--primary-light);border-bottom:1px dashed var(--primary-light);transition:var(--transition)}.post-content a:hover{color:var(--accent);border-bottom-color:var(--accent)}
.post-footer{margin-top:52px;padding-top:28px;border-top:1px solid var(--border)}.back-link{display:inline-flex;align-items:center;gap:10px;color:var(--text-secondary)!important;font-weight:600;font-size:1rem;transition:var(--transition);padding:12px 24px;border-radius:var(--radius);border:1px solid var(--border)}.back-link:hover{color:var(--primary-light)!important;border-color:var(--primary-light);background:rgba(99,102,241,0.1);transform:translateX(-4px)}
.about-page{max-width:800px;margin:0 auto}.about-header{text-align:center;padding:50px 0}.about-avatar{font-size:6rem;margin-bottom:24px;animation:float 3s ease-in-out infinite}.about-header h1{font-size:3rem;font-weight:900;margin-bottom:12px;background:linear-gradient(135deg,var(--primary-light) 0%,var(--accent) 50%,var(--accent2) 100%);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradient-shift 4s ease infinite}.about-role{font-size:1.2rem;color:var(--text-secondary);font-weight:300;letter-spacing:1px}.about-section{background:var(--bg-card);border-radius:var(--radius-lg);padding:36px;margin-bottom:28px;border:1px solid var(--border);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);transition:var(--transition)}.about-section:hover{border-color:var(--primary-dark);box-shadow:0 8px 24px rgba(0,0,0,0.2)}.about-section h2{font-size:1.5rem;font-weight:700;margin-bottom:24px;display:flex;align-items:center;gap:14px}.about-section h2 i{color:var(--accent);font-size:1.3rem}.about-section p{color:var(--text-secondary);line-height:1.8}.skills-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}.skill-card{background:rgba(15,23,42,0.7);padding:28px;border-radius:var(--radius);text-align:center;transition:var(--transition);border:1px solid transparent}.skill-card:hover{transform:translateY(-4px);background:rgba(51,65,85,0.7);border-color:var(--primary-dark);box-shadow:0 8px 24px rgba(0,0,0,0.2)}.skill-icon{font-size:3rem;margin-bottom:14px}.skill-card h3{font-size:1.15rem;font-weight:700;margin-bottom:10px}.skill-card p{font-size:.9rem;color:var(--text-muted);line-height:1.6}.contact-links{display:flex;gap:18px;flex-wrap:wrap}.contact-btn{display:inline-flex;align-items:center;gap:12px;background:rgba(15,23,42,0.7);color:var(--text-primary)!important;padding:16px 32px;border-radius:var(--radius);font-weight:600;font-size:1rem;transition:var(--transition);border:1px solid var(--border);text-decoration:none}.contact-btn:hover{background:linear-gradient(135deg,var(--primary-dark),var(--primary));border-color:var(--primary-light);transform:translateY(-3px);box-shadow:0 8px 20px rgba(99,102,241,0.3)}.contact-btn i{font-size:1.3rem}
.footer{background:rgba(30,41,59,0.8);border-top:1px solid var(--border);padding:36px 0;margin-top:64px;-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px)}.footer-content{text-align:center;color:var(--text-muted);font-size:.9rem}.footer-content p{margin-bottom:10px}.footer-content a{color:var(--primary-light)!important;transition:var(--transition)}.footer-content a:hover{color:var(--accent)!important}
@keyframes gradient-shift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes hero-glow{0%{opacity:.5;transform:translate(-50%,-50%) scale(1)}100%{opacity:.8;transform:translate(-50%,-50%) scale(1.1)}}
@media(max-width:768px){.hero-title{font-size:2.5rem}.hero-subtitle{font-size:1.1rem}.hero-subtitle::before,.hero-subtitle::after{display:none}.posts-grid{grid-template-columns:1fr}.post-title{font-size:2rem}.skills-grid{grid-template-columns:1fr}.nav-links{gap:4px}.nav-link{padding:8px 14px;font-size:.9rem}.about-header h1{font-size:2.2rem}}
@media(max-width:480px){.container{padding:0 16px}.hero{padding:50px 0 40px}.hero-title{font-size:2rem}.post-card{padding:24px}.about-section{padding:28px}.contact-links{flex-direction:column}.contact-btn{justify-content:center}}
    </style>
</head>
<body>
    <div class="starry-bg" id="starryBg"></div>
    <div class="starry-overlay"></div>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">
                <span class="logo-icon">⚡</span>
                <span class="logo-text">ChenChuLin</span>
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link {% if page.url == '/' %}active{% endif %}"><i class="fas fa-home"></i> 首页</a>
                <a href="/categories/" class="nav-link {% if page.url == '/categories/' %}active{% endif %}"><i class="fas fa-folder"></i> 分类</a>
                <a href="/tags/" class="nav-link {% if page.url == '/tags/' %}active{% endif %}"><i class="fas fa-tags"></i> 标签</a>
                <a href="/about/" class="nav-link {% if page.url == '/about/' %}active{% endif %}"><i class="fas fa-user"></i> 关于</a>
                <a href="https://github.com/cxy-yao" target="_blank" class="nav-link"><i class="fab fa-github"></i> GitHub</a>
            </div>
        </div>
    </nav>
    <main class="main-content">
        <div class="container">
            {{ content }}
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>© {{ site.time | date: "%Y" }} <strong>{{ site.author }}</strong>. All rights reserved.</p>
                <p><i class="fas fa-code"></i> with <i class="fas fa-heart" style="color:#ef4444"></i> by {{ site.author }} · Powered by <a href="https://jekyllrb.com" target="_blank">Jekyll</a> & <a href="https://pages.github.com" target="_blank">GitHub Pages</a></p>
            </div>
        </div>
    </footer>
    <script>
    var starryImages = [
      "https://images.unsplash.com/photo-1519681393784-d120267933ba?w=1920&q=80",
      "https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?w=1920&q=80",
      "https://images.unsplash.com/photo-1444703686981-a3abbc4d4fe3?w=1920&q=80",
      "https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?w=1920&q=80",
      "https://images.unsplash.com/photo-1507400492013-162706c8c05e?w=1920&q=80",
      "https://images.unsplash.com/photo-1464802686167-b939a6910659?w=1920&q=80",
      "https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=1920&q=80",
      "https://images.unsplash.com/photo-1465101162946-4377e57745c3?w=1920&q=80",
      "https://images.unsplash.com/photo-1543722530-d2c3201371e7?w=1920&q=80",
      "https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?w=1920&q=80"
    ];
    var bg = document.getElementById("starryBg");
    var randomImg = starryImages[Math.floor(Math.random() * starryImages.length)];
    var img = new Image();
    img.onload = function() {
      bg.style.backgroundImage = "url(" + randomImg + ")";
      bg.classList.add("active");
    };
    img.src = randomImg;
    </script>
</body>
</html>
