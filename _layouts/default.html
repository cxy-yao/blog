<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="author" content="{{ site.author }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
:root{--primary:#6366f1;--primary-light:#818cf8;--primary-dark:#4f46e5;--accent:#22d3ee;--bg-dark:#0f172a;--bg-card:rgba(30,41,59,0.85);--bg-card-hover:rgba(51,65,85,0.9);--text-primary:#f8fafc;--text-secondary:#94a3b8;--text-muted:#64748b;--border:rgba(51,65,85,0.6);--radius:12px;--radius-lg:16px;--transition:all .3s ease}*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg-dark);color:var(--text-primary);line-height:1.7;min-height:100vh;position:relative}a{color:var(--primary-light);text-decoration:none;transition:var(--transition)}a:hover{color:var(--accent)}.container{max-width:1200px;margin:0 auto;padding:0 24px}
.starry-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;background-size:cover;background-position:center;background-repeat:no-repeat;transition:opacity 1.5s ease-in-out;opacity:0}.starry-bg.active{opacity:1}.starry-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;background:rgba(15,23,42,0.75);pointer-events:none}
.navbar{background:rgba(15,23,42,.85);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding:16px 0}.navbar .container{display:flex;justify-content:space-between;align-items:center}.logo{display:flex;align-items:center;gap:10px;font-size:1.3rem;font-weight:700;color:var(--text-primary)!important;text-decoration:none}.logo-icon{font-size:1.5rem}.logo-text{background:linear-gradient(135deg,var(--primary-light),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.nav-links{display:flex;gap:8px}.nav-link{color:var(--text-secondary)!important;padding:8px 16px;border-radius:8px;font-size:.95rem;font-weight:500;transition:var(--transition);text-decoration:none}.nav-link:hover,.nav-link.active{color:var(--text-primary)!important;background:rgba(30,41,59,0.8)}
.main-content{min-height:calc(100vh - 200px);padding:40px 0}
.hero{text-align:center;padding:60px 0 40px}.hero-title{font-size:3rem;font-weight:800;margin-bottom:16px;background:linear-gradient(135deg,var(--primary-light),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.hero-subtitle{font-size:1.2rem;color:var(--text-secondary);font-weight:300}
.section-title{font-size:1.5rem;font-weight:600;margin-bottom:32px;display:flex;align-items:center;gap:12px}.section-title i{color:var(--primary-light)}
.posts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:24px}
.post-card{background:var(--bg-card);border-radius:var(--radius-lg);padding:28px;transition:var(--transition);border:1px solid var(--border);display:flex;flex-direction:column;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}.post-card:hover{transform:translateY(-4px);box-shadow:0 10px 15px -3px rgba(0,0,0,.4);border-color:var(--primary-dark);background:var(--bg-card-hover)}.post-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-size:.85rem;color:var(--text-muted)}.post-card-category{background:var(--primary-dark);color:var(--text-primary);padding:4px 12px;border-radius:20px;font-size:.75rem;font-weight:500}.post-card-title{font-size:1.3rem;font-weight:600;margin-bottom:12px;line-height:1.4}.post-card-title a{color:var(--text-primary)!important}.post-card-title a:hover{color:var(--primary-light)!important}.post-card-excerpt{color:var(--text-secondary);font-size:.95rem;line-height:1.6;margin-bottom:16px;flex-grow:1}.post-card-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}.tag-small{font-size:.75rem;color:var(--accent);background:rgba(34,211,238,.15);padding:4px 10px;border-radius:6px}.read-more{display:inline-flex;align-items:center;gap:8px;font-size:.9rem;font-weight:500;color:var(--primary-light)!important;margin-top:auto}.read-more i{transition:var(--transition)}.read-more:hover i{transform:translateX(4px)}
.post-detail{max-width:800px;margin:0 auto}.post-header{margin-bottom:40px;padding-bottom:24px;border-bottom:1px solid var(--border)}.post-meta{display:flex;gap:20px;margin-bottom:16px;font-size:.9rem;color:var(--text-muted)}.post-meta i{margin-right:6px}.category-tag{background:var(--primary-dark);color:var(--text-primary);padding:2px 10px;border-radius:12px;font-size:.8rem}.post-title{font-size:2.5rem;font-weight:700;line-height:1.3;margin-bottom:16px}.post-tags{display:flex;flex-wrap:wrap;gap:10px}.tag{font-size:.85rem;color:var(--accent);background:rgba(34,211,238,.15);padding:6px 14px;border-radius:8px}
.post-content{font-size:1.05rem;line-height:1.8}.post-content h1,.post-content h2,.post-content h3,.post-content h4{margin-top:2em;margin-bottom:.8em;font-weight:600;color:var(--text-primary)}.post-content h2{font-size:1.6rem;padding-bottom:8px;border-bottom:2px solid var(--primary-dark)}.post-content h3{font-size:1.3rem}.post-content p{margin-bottom:1.2em;color:var(--text-secondary)}.post-content ul,.post-content ol{margin-bottom:1.2em;padding-left:2em;color:var(--text-secondary)}.post-content li{margin-bottom:.5em}.post-content blockquote{border-left:4px solid var(--primary);background:rgba(30,41,59,0.7);padding:16px 24px;margin:24px 0;border-radius:0 var(--radius) var(--radius) 0;font-style:italic;color:var(--text-secondary)}.post-content code{font-family:'JetBrains Mono',monospace;background:rgba(30,41,59,0.8);padding:2px 8px;border-radius:4px;font-size:.9em;color:var(--accent)}.post-content pre{background:rgba(30,41,59,0.8);padding:20px;border-radius:var(--radius);overflow-x:auto;margin:24px 0;border:1px solid var(--border)}.post-content pre code{background:none;padding:0;color:var(--text-primary)}.post-content img{max-width:100%;border-radius:var(--radius);margin:24px 0}.post-content strong{color:var(--text-primary);font-weight:600}.post-content hr{border:none;height:1px;background:var(--border);margin:2em 0}
.post-footer{margin-top:48px;padding-top:24px;border-top:1px solid var(--border)}.back-link{display:inline-flex;align-items:center;gap:8px;color:var(--text-secondary)!important;font-weight:500}.back-link:hover{color:var(--primary-light)!important}
.about-page{max-width:800px;margin:0 auto}.about-header{text-align:center;padding:40px 0}.about-avatar{font-size:5rem;margin-bottom:20px}.about-header h1{font-size:2.5rem;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,var(--primary-light),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.about-role{font-size:1.1rem;color:var(--text-secondary)}.about-section{background:var(--bg-card);border-radius:var(--radius-lg);padding:32px;margin-bottom:24px;border:1px solid var(--border);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}.about-section h2{font-size:1.4rem;font-weight:600;margin-bottom:20px;display:flex;align-items:center;gap:12px}.about-section h2 i{color:var(--primary-light)}.about-section p{color:var(--text-secondary);line-height:1.8}.skills-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}.skill-card{background:rgba(15,23,42,0.7);padding:24px;border-radius:var(--radius);text-align:center;transition:var(--transition)}.skill-card:hover{transform:translateY(-2px);background:rgba(51,65,85,0.7)}.skill-icon{font-size:2.5rem;margin-bottom:12px}.skill-card h3{font-size:1.1rem;font-weight:600;margin-bottom:8px}.skill-card p{font-size:.9rem;color:var(--text-muted)}.contact-links{display:flex;gap:16px;flex-wrap:wrap}.contact-btn{display:inline-flex;align-items:center;gap:10px;background:rgba(15,23,42,0.7);color:var(--text-primary)!important;padding:14px 28px;border-radius:var(--radius);font-weight:500;transition:var(--transition);border:1px solid var(--border);text-decoration:none}.contact-btn:hover{background:var(--primary-dark);border-color:var(--primary);transform:translateY(-2px)}.contact-btn i{font-size:1.2rem}
.footer{background:rgba(30,41,59,0.8);border-top:1px solid var(--border);padding:32px 0;margin-top:60px;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}.footer-content{text-align:center;color:var(--text-muted);font-size:.9rem}.footer-content p{margin-bottom:8px}.footer-content a{color:var(--primary-light)!important}
@media(max-width:768px){.hero-title{font-size:2rem}.hero-subtitle{font-size:1rem}.posts-grid{grid-template-columns:1fr}.post-title{font-size:1.8rem}.skills-grid{grid-template-columns:1fr}.nav-links{gap:4px}.nav-link{padding:6px 12px;font-size:.85rem}}
@media(max-width:480px){.container{padding:0 16px}.hero{padding:40px 0 30px}.post-card{padding:20px}.about-section{padding:24px}.contact-links{flex-direction:column}.contact-btn{justify-content:center}}
    </style>
</head>
<body>
    <div class="starry-bg" id="starryBg"></div>
    <div class="starry-overlay"></div>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">
                <span class="logo-icon">⚡</span>
                <span class="logo-text">ChenChuLin</span>
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link {% if page.url == '/' %}active{% endif %}">首页</a>
                <a href="/about/" class="nav-link {% if page.url == '/about/' %}active{% endif %}">关于</a>
                <a href="https://github.com/cxy-yao" target="_blank" class="nav-link">GitHub</a>
            </div>
        </div>
    </nav>
    <main class="main-content">
        <div class="container">
            {{ content }}
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; {{ site.time | date: "%Y" }} {{ site.author }}. All rights reserved.</p>
                <p>Powered by <a href="https://jekyllrb.com" target="_blank">Jekyll</a> & <a href="https://pages.github.com" target="_blank">GitHub Pages</a></p>
            </div>
        </div>
    </footer>
    <script>
    var starryImages = [
      "https://images.unsplash.com/photo-1519681393784-d120267933ba?w=1920&q=80",
      "https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?w=1920&q=80",
      "https://images.unsplash.com/photo-1444703686981-a3abbc4d4fe3?w=1920&q=80",
      "https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?w=1920&q=80",
      "https://images.unsplash.com/photo-1507400492013-162706c8c05e?w=1920&q=80",
      "https://images.unsplash.com/photo-1464802686167-b939a6910659?w=1920&q=80",
      "https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=1920&q=80",
      "https://images.unsplash.com/photo-1465101162946-4377e57745c3?w=1920&q=80",
      "https://images.unsplash.com/photo-1543722530-d2c3201371e7?w=1920&q=80",
      "https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?w=1920&q=80"
    ];
    var bg = document.getElementById("starryBg");
    var randomImg = starryImages[Math.floor(Math.random() * starryImages.length)];
    var img = new Image();
    img.onload = function() {
      bg.style.backgroundImage = "url(" + randomImg + ")";
      bg.classList.add("active");
    };
    img.src = randomImg;
    </script>
</body>
</html>
