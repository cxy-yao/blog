name: Sync DC Notes to Drafts

on:
  push:
    branches: [obsidian-dc]
    paths:
      - 'DC/**'

jobs:
  sync-drafts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync DC files to _drafts
        run: |
          mkdir -p _drafts

          # 获取 obsidian-dc 分支的 DC 文件
          git fetch origin obsidian-dc

          # 清空旧的 _drafts/dc/ 内容
          rm -rf _drafts/dc
          mkdir -p _drafts/dc

          # 从 obsidian-dc 分支复制 DC 内容
          git checkout origin/obsidian-dc -- DC/ 2>/dev/null || true
          if [ -d DC ]; then
            cp -r DC/* _drafts/dc/ 2>/dev/null || true
            rm -rf DC
          fi

          # 为没有 frontmatter 的 md 文件自动添加 Jekyll frontmatter
          for f in _drafts/dc/**/*.md _drafts/dc/*.md; do
            [ -f "$f" ] || continue
            # 检查是否已有 frontmatter
            if ! head -1 "$f" | grep -q '^---'; then
              title=$(basename "$f" .md)
              tmp=$(mktemp)
              cat > "$tmp" << EOF
          ---
          layout: post
          title: "$title"
          categories: [dc]
          tags: []
          ---

          EOF
              cat "$f" >> "$tmp"
              mv "$tmp" "$f"
            fi
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _drafts/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "sync: DC笔记自动同步到 _drafts/dc/"
            git push
          fi
