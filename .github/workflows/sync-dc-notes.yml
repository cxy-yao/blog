name: Sync DC Notes to Blog

on:
  push:
    branches: [obsidian-dc]
    paths:
      - 'DC/**'
      - '!DC/.辅助文件/**'

jobs:
  sync-posts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync DC to _posts
        run: |
          git fetch origin obsidian-dc
          mkdir -p _posts

          # 获取 DC 文件列表，解码转义的 Unicode 字符
          DC_FILES=$(git ls-tree -r --name-only origin/obsidian-dc -- DC/ | while read -r line; do
            line="${line#\"}"
            line="${line%\"}"
            printf '%b\n' "$line"
          done | grep '\.md$' | grep -v '/\.' || true)

          echo "Found DC files:"
          echo "$DC_FILES"

          # 记录当前 _posts 中已同步的文件
          SYNCED_POSTS=$(grep -rl 'dc-sync: true' _posts/ 2>/dev/null || true)

          # 同步 DC 文件到 _posts
          SYNCED_NOW=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue

            git checkout origin/obsidian-dc -- "$file"
            [ ! -f "$file" ] && continue

            CONTENT=$(cat "$file")
            BASENAME=$(basename "$file" .md)

            # 提取 frontmatter 字段
            DATE=$(echo "$CONTENT" | grep -m1 '^date:' | sed 's/^date:\s*//' | tr -d '"' | tr -d "'" | head -1)
            [ -z "$DATE" ] && DATE=$(date +%Y-%m-%d)

            TITLE=$(echo "$CONTENT" | grep -m1 '^title:' | sed 's/^title:\s*//' | tr -d '"' | tr -d "'" | head -1)
            [ -z "$TITLE" ] && TITLE="$BASENAME"

            CATEGORIES=$(echo "$CONTENT" | grep -m1 '^categories:' | sed 's/^categories:\s*//')
            [ -z "$CATEGORIES" ] && CATEGORIES="[]"

            TAGS=$(echo "$CONTENT" | grep -m1 '^tags:' | sed 's/^tags:\s*//')
            [ -z "$TAGS" ] && TAGS="[]"

            EXCERPT=$(echo "$CONTENT" | grep -m1 '^excerpt:' | sed 's/^excerpt:\s*//' | tr -d '"' | tr -d "'")
            [ -z "$EXCERPT" ] && EXCERPT=""

            # 提取正文（去掉 frontmatter）
            BODY=$(echo "$CONTENT" | sed '1,/^---$/d' | sed '1,/^---$/d')

            # 删除 Obsidian 专属语法：Excalidraw 嵌入
            BODY=$(echo "$BODY" | sed '/!\[\[.*\.excalidraw.*\]\]/d')

            # 生成文件名
            SLUG=$(echo "$BASENAME" | sed 's/[^a-zA-Z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-50)
            [ -z "$SLUG" ] && SLUG="post"
            POST_FILE="_posts/${DATE}-${SLUG}.md"

            # 始终重新构建 frontmatter
            cat > "$POST_FILE" << EOF
          ---
          layout: post
          title: "$TITLE"
          date: $DATE
          categories: $CATEGORIES
          tags: $TAGS
          excerpt: "$EXCERPT"
          dc-sync: true
          dc-source: "$file"
          ---

          EOF
            echo "$BODY" >> "$POST_FILE"

            SYNCED_NOW="$SYNCED_NOW|$POST_FILE"
            echo "Synced: $file -> $POST_FILE"

            rm -f "$file"
            rmdir -p "$(dirname "$file")" 2>/dev/null || true

          done <<< "$DC_FILES"

          # 删除已不存在于 DC 的笔记
          for post in $SYNCED_POSTS; do
            if ! echo "$SYNCED_NOW" | grep -q "|$post"; then
              rm -f "$post" && echo "Deleted: $post"
            fi
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "sync: DC notes $(date +%Y-%m-%d)"
            git push
          fi
