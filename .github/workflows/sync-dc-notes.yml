name: Sync DC Notes to Blog

on:
  push:
    branches: [obsidian-dc]
    paths:
      - 'DC/**'

jobs:
  sync-posts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Get changed DC files
        id: changed
        run: |
          git fetch origin obsidian-dc
          CHANGED=$(git diff --name-only --diff-filter=ACMR -z origin/main origin/obsidian-dc -- DC/ | tr '\0' '\n' || true)
          DELETED=$(git diff --name-only --diff-filter=D -z origin/main origin/obsidian-dc -- DC/ | tr '\0' '\n' || true)
          echo "changed<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "deleted<<EOF" >> $GITHUB_OUTPUT
          echo "$DELETED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Sync to _posts
        run: |
          mkdir -p _posts

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [[ "$file" != *.md ]] && continue

            echo "Processing: $file"

            git checkout origin/obsidian-dc -- "$file"
            if [ ! -f "$file" ]; then
              echo "Failed to checkout: $file"
              continue
            fi

            CONTENT=$(cat "$file")
            BASENAME=$(basename "$file" .md)

            DATE=$(echo "$CONTENT" | grep -m1 '^date:' | sed 's/^date:\s*//' | tr -d '"' | tr -d "'" | head -1)
            if [ -z "$DATE" ]; then
              DATE=$(git log origin/obsidian-dc -1 --format="%ai" -- "$file" 2>/dev/null | cut -d' ' -f1)
              [ -z "$DATE" ] && DATE=$(date +%Y-%m-%d)
            fi

            TITLE=$(echo "$CONTENT" | grep -m1 '^title:' | sed 's/^title:\s*//' | tr -d '"' | tr -d "'" | head -1)
            [ -z "$TITLE" ] && TITLE="$BASENAME"

            # Generate slug: keep alphanumeric and Chinese, replace others with hyphens
            SLUG=$(echo "$BASENAME" | sed 's/[^a-zA-Z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-50)
            [ -z "$SLUG" ] && SLUG="post"

            POST_FILE="_posts/${DATE}-${SLUG}.md"

            if ! echo "$CONTENT" | head -1 | grep -q '^---'; then
              cat > "$POST_FILE" << EOF
          ---
          layout: post
          title: "$TITLE"
          date: $DATE
          categories: []
          tags: []
          ---

          EOF
              echo "$CONTENT" >> "$POST_FILE"
            else
              echo "$CONTENT" > "$POST_FILE"
              grep -q '^layout:' "$POST_FILE" || sed -i '1a layout: post' "$POST_FILE"
              grep -q '^date:' "$POST_FILE" || sed -i "/^---$/a date: $DATE" "$POST_FILE"
            fi

            echo "Synced: $file -> $POST_FILE"

            rm -f "$file"
            rmdir -p "$(dirname "$file")" 2>/dev/null || true

          done <<< "${{ steps.changed.outputs.changed }}"

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [[ "$file" != *.md ]] && continue
            BASENAME=$(basename "$file" .md)
            find _posts -name "*${BASENAME}*" -delete 2>/dev/null && echo "Deleted: $BASENAME"
          done <<< "${{ steps.changed.outputs.deleted }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "sync: DC notes to blog $(date +%Y-%m-%d)"
            git push
          fi
