name: Sync DC Notes to Blog

on:
  workflow_dispatch:
  push:
    branches: [obsidian-dc]
    paths:
      - 'DC/**'
      - '!DC/辅助文件/**'
      - '!DC/templates/**'

jobs:
  sync-posts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync DC to _posts
        run: |
          git fetch origin obsidian-dc
          mkdir -p _posts assets

          # 1. 同步 SVG 文件到 assets
          SVG_FILES=$(git ls-tree -r --name-only origin/obsidian-dc -- DC/ | while read -r line; do
            line="${line#\"}"
            line="${line%\"}"
            printf '%b\n' "$line"
          done | grep '\.svg$' || true)

          while IFS= read -r svg; do
            [ -z "$svg" ] && continue
            git checkout origin/obsidian-dc -- "$svg"
            SVG_NAME=$(basename "$svg")
            cp "$svg" "assets/$SVG_NAME"
            echo "SVG synced: $svg -> assets/$SVG_NAME"
            rm -f "$svg"
          done <<< "$SVG_FILES"

          # 2. 获取 DC .md 文件列表（排除辅助文件）
          DC_FILES=$(git ls-tree -r --name-only origin/obsidian-dc -- DC/ | while read -r line; do
            line="${line#\"}"
            line="${line%\"}"
            printf '%b\n' "$line"
          done | grep '\.md$' | grep -v '辅助文件' | grep -v 'templates' || true)

          echo "Found DC files:"
          echo "$DC_FILES"

          # 记录当前 _posts 中已同步的文件
          SYNCED_POSTS=$(grep -rl 'dc-sync: true' _posts/ 2>/dev/null || true)

          # 3. 同步 DC 文件到 _posts
          SYNCED_NOW=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue

            git checkout origin/obsidian-dc -- "$file"
            [ ! -f "$file" ] && continue

            # 使用 awk 提取 frontmatter 字段和正文
            TITLE=$(awk '/^title:/{gsub(/^title: *"?/,""); gsub(/"$/,""); print; exit}' "$file")
            DATE=$(awk '/^date:/{gsub(/^date: */,""); gsub(/"/,""); print; exit}' "$file")
            CATEGORIES=$(awk '/^categories:/{gsub(/^categories: */,""); print; exit}' "$file")
            TAGS=$(awk '/^tags:/{gsub(/^tags: */,""); print; exit}' "$file")
            EXCERPT=$(awk '/^excerpt:/{gsub(/^excerpt: *"?/,""); gsub(/"$/,""); print; exit}' "$file")

            # 提取正文
            BODY=$(awk 'BEGIN{c=0} /^---$/{c++; next} c>=2{print}' "$file")

            # 转换 Obsidian 语法：![[辅助文件/xxx.svg|width]] -> ![xxx](/assets/xxx.svg)
            BODY=$(echo "$BODY" | python3 -c "
          import sys, re
          text = sys.stdin.read()
          # ![[辅助文件/xxx.svg|width]] -> ![xxx](/assets/xxx.svg)
          text = re.sub(r'!\[\[辅助文件/([^]|]+)\.svg\|?\d*\]\]', r'![\1](/assets/\1.svg)', text)
          # 删除 excalidraw 嵌入
          text = re.sub(r'!\[\[.*\.excalidraw.*\]\]', '', text)
          print(text, end='')
          ")

            # 默认值
            [ -z "$TITLE" ] && TITLE=$(basename "$file" .md)
            [ -z "$DATE" ] && DATE=$(date +%Y-%m-%d)
            [ -z "$CATEGORIES" ] && CATEGORIES="[]"
            [ -z "$TAGS" ] && TAGS="[]"
            [ -z "$EXCERPT" ] && EXCERPT=""

            # 生成文件名（用 python 处理中文 slug）
            SLUG=$(python3 -c "
          import re, sys
          title = sys.argv[1]
          slug = re.sub(r'[^\w\u4e00-\u9fff]', '-', title)
          slug = re.sub(r'-+', '-', slug).strip('-')
          print(slug[:50] if slug else 'post')
          " "$TITLE")

            [ -z "$SLUG" ] && SLUG="post"
            POST_FILE="_posts/${DATE}-${SLUG}.md"

            # 写入 frontmatter + 正文
            {
              echo "---"
              echo "layout: post"
              echo "title: \"$TITLE\""
              echo "date: $DATE"
              echo "categories: $CATEGORIES"
              echo "tags: $TAGS"
              echo "excerpt: \"$EXCERPT\""
              echo "dc-sync: true"
              echo "dc-source: \"$file\""
              echo "---"
              echo ""
              echo "$BODY"
            } > "$POST_FILE"

            SYNCED_NOW="$SYNCED_NOW|$POST_FILE"
            echo "Synced: $file -> $POST_FILE ($TITLE)"

            # 清理 checkout 的文件
            rm -f "$file"
            rmdir -p "$(dirname "$file")" 2>/dev/null || true

          done <<< "$DC_FILES"

          # 删除已不存在于 DC 的笔记
          for post in $SYNCED_POSTS; do
            if ! echo "$SYNCED_NOW" | grep -q "|$post"; then
              rm -f "$post" && echo "Deleted: $post"
            fi
          done

          # 清理 DC 目录
          rm -rf DC/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/ assets/
          git rm -r --cached DC/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "sync: DC notes $(date +%Y-%m-%d)"
            git push
          fi
