name: Sync DC Notes to Blog

on:
  push:
    branches: [obsidian-dc]
    paths:
      - 'DC/**'

jobs:
  sync-posts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Get changed DC files
        id: changed
        run: |
          git fetch origin obsidian-dc
          CHANGED=$(git diff --name-only --diff-filter=ACMR -z origin/main origin/obsidian-dc -- DC/ | tr '\0' '\n' || true)
          DELETED=$(git diff --name-only --diff-filter=D -z origin/main origin/obsidian-dc -- DC/ | tr '\0' '\n' || true)
          echo "changed<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "deleted<<EOF" >> $GITHUB_OUTPUT
          echo "$DELETED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create helper script
        run: |
          cat > /tmp/slug.py << 'PYEOF'
          import re, sys
          name = sys.argv[1]
          slug = re.sub(r'[^\w\u4e00-\u9fff]', '-', name)
          slug = re.sub(r'-+', '-', slug).strip('-')
          print(slug if slug else 'post')
          PYEOF

          cat > /tmp/insert_fm.py << 'PYEOF'
          import sys
          lines = open(sys.argv[1]).readlines()
          key = sys.argv[2] + ':'
          val = sys.argv[3]
          for i, line in enumerate(lines):
              if line.strip() == '---' and i > 0:
                  lines.insert(i, f'{key} {val}\n')
                  break
          open(sys.argv[1], 'w').writelines(lines)
          PYEOF

      - name: Sync to _posts
        run: |
          mkdir -p _posts

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [[ "$file" != *.md ]] && continue

            echo "Processing: $file"

            git checkout origin/obsidian-dc -- "$file"
            if [ ! -f "$file" ]; then
              echo "Failed to checkout: $file"
              continue
            fi

            CONTENT=$(cat "$file")
            BASENAME=$(basename "$file" .md)

            DATE=$(echo "$CONTENT" | grep -m1 '^date:' | sed 's/^date:\s*//' | tr -d '"' | tr -d "'" | head -1)
            if [ -z "$DATE" ]; then
              DATE=$(git log origin/obsidian-dc -1 --format="%ai" -- "$file" 2>/dev/null | cut -d' ' -f1)
              [ -z "$DATE" ] && DATE=$(date +%Y-%m-%d)
            fi

            SLUG=$(python3 /tmp/slug.py "$BASENAME")
            POST_FILE="_posts/${DATE}-${SLUG}.md"

            if ! echo "$CONTENT" | head -1 | grep -q '^---'; then
              TITLE="$BASENAME"
              cat > "$POST_FILE" << FRONTMATTER
          ---
          layout: post
          title: "$TITLE"
          date: $DATE
          categories: []
          tags: []
          ---

          FRONTMATTER
              echo "$CONTENT" >> "$POST_FILE"
            else
              echo "$CONTENT" > "$POST_FILE"
              if ! grep -q '^layout:' "$POST_FILE"; then
                python3 /tmp/insert_fm.py "$POST_FILE" "layout" "post"
              fi
              if ! grep -q '^date:' "$POST_FILE"; then
                python3 /tmp/insert_fm.py "$POST_FILE" "date" "$DATE"
              fi
            fi

            echo "Synced: $file -> $POST_FILE"

            rm -f "$file"
            rmdir -p "$(dirname "$file")" 2>/dev/null || true

          done <<< "${{ steps.changed.outputs.changed }}"

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [[ "$file" != *.md ]] && continue
            BASENAME=$(basename "$file" .md)
            find _posts -name "*${BASENAME}*" -delete 2>/dev/null && echo "Deleted: $BASENAME"
          done <<< "${{ steps.changed.outputs.deleted }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "sync: DC笔记同步到博客 $(date +%Y-%m-%d)"
            git push
          fi
