name: Sync DC Notes to Blog

on:
  push:
    branches: [obsidian-dc]
    paths:
      - 'DC/**'
      - '!DC/.辅助文件/**'

jobs:
  sync-posts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync DC to _posts
        run: |
          git fetch origin obsidian-dc
          mkdir -p _posts

          # 1. 获取 obsidian-dc 分支上当前所有 DC 文件（排除 .辅助文件）
          DC_FILES=$(git ls-tree -r --name-only origin/obsidian-dc -- DC/ | sed 's/^"//;s/"$//' | grep '\\.md$' | grep -v '\\.辅助文件/' || true)

          # 2. 记录当前 _posts 中已同步的文件
          SYNCED_POSTS=$(grep -rl 'dc-sync: true' _posts/ 2>/dev/null || true)

          # 3. 同步 DC 文件到 _posts
          SYNCED_NOW=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue

            git checkout origin/obsidian-dc -- "$file"
            [ ! -f "$file" ] && continue

            CONTENT=$(cat "$file")
            BASENAME=$(basename "$file" .md)

            DATE=$(echo "$CONTENT" | grep -m1 '^date:' | sed 's/^date:\s*//' | tr -d '"' | tr -d "'" | head -1)
            [ -z "$DATE" ] && DATE=$(date +%Y-%m-%d)

            TITLE=$(echo "$CONTENT" | grep -m1 '^title:' | sed 's/^title:\s*//' | tr -d '"' | tr -d "'" | head -1)
            [ -z "$TITLE" ] && TITLE="$BASENAME"

            SLUG=$(echo "$BASENAME" | sed 's/[^a-zA-Z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-50)
            [ -z "$SLUG" ] && SLUG="post"
            POST_FILE="_posts/${DATE}-${SLUG}.md"

            if ! echo "$CONTENT" | head -1 | grep -q '^---'; then
              cat > "$POST_FILE" << EOF
          ---
          layout: post
          title: "$TITLE"
          date: $DATE
          categories: []
          tags: []
          dc-sync: true
          dc-source: "$file"
          ---

          EOF
              echo "$CONTENT" >> "$POST_FILE"
            else
              echo "$CONTENT" > "$POST_FILE"
              grep -q '^layout:' "$POST_FILE" || sed -i '1a layout: post' "$POST_FILE"
              grep -q '^dc-sync:' "$POST_FILE" || sed -i "/^---$/a dc-sync: true" "$POST_FILE"
              grep -q '^dc-source:' "$POST_FILE" || sed -i "/^---$/a dc-source: $file" "$POST_FILE"
            fi

            SYNCED_NOW="$SYNCED_NOW|$POST_FILE"
            echo "Synced: $file -> $POST_FILE"

            rm -f "$file"
            rmdir -p "$(dirname "$file")" 2>/dev/null || true

          done <<< "$DC_FILES"

          # 4. 删除已不存在于 DC 的笔记
          for post in $SYNCED_POSTS; do
            if ! echo "$SYNCED_NOW" | grep -q "|$post"; then
              rm -f "$post" && echo "Deleted: $post"
            fi
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "sync: DC notes $(date +%Y-%m-%d)"
            git push
          fi
